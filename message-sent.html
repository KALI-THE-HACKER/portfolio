<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Luckylinux</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
        
        :root {
            --cream: #fdfaf6;
            --cream-darker: #f5efe6;
            --glass: rgba(255, 255, 255, 0.45);
            --glass-darker: rgba(255, 255, 255, 0.75);
        }
        
        * {
            font-family: 'Outfit', sans-serif;
            scroll-behavior: smooth;
        }
        
        body {
            background: linear-gradient(135deg, var(--cream) 0%, var(--cream-darker) 100%);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        .glass-darker {
            background: var(--glass-darker);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .gradient-text {
            background: linear-gradient(45deg, #3B82F6, #EC4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(236, 72, 153, 0.1));
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: blobFloat 20s infinite alternate;
        }
        
        .check-mark {
            animation: checkmark 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transform: scale(0);
        }
        
        .thank-you-card {
            animation: fadeInUp 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        
        .back-btn {
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            transform: translateX(-5px);
        }
        
        @keyframes checkmark {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes blobFloat {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 100px) scale(1.1); }
            100% { transform: translate(-100px, -100px) scale(0.9); }
        }
        
        .nav-link {
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background: linear-gradient(45deg, #3B82F6, #EC4899);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }
        
        .mobile-menu-btn {
            display: none;
        }
        
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }
            .desktop-menu {
                display: none;
            }
            .mobile-menu {
                flex-direction: column;
                width: 100%;
                padding: 1rem 0;/Users/luckyverma/Downloads/images-removebg-preview.png
            }
            .mobile-menu a {
                display: block;
                padding: 0.75rem 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            }
            .mobile-menu a:last-child {
                border-bottom: none;
            }
        }
    </style>
</head>
<body>
    <!-- Background Blobs -->
    <div class="blob" style="top: -250px; left: -150px;"></div>
    <div class="blob" style="bottom: -250px; right: -150px;"></div>

    <!-- Navigation -->
    <nav class="glass-darker fixed w-full z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex flex-wrap justify-between items-center">
            <div class="text-2xl font-semibold gradient-text">Portfolio</div>
            
            <!-- Desktop Menu -->
            <div class="hidden md:flex space-x-8 desktop-menu">
                <a href="index.html#home" class="nav-link hover:text-blue-600 transition">Home</a>
                <a href="index.html#projects" class="nav-link hover:text-blue-600 transition">Projects</a>
                <a href="index.html#github" class="nav-link hover:text-blue-600 transition">GitHub</a>
                <a href="index.html#skills" class="nav-link hover:text-blue-600 transition">Skills</a>
                <a href="index.html#contact" class="nav-link hover:text-blue-600 transition">Contact</a>
            </div>
            
            <!-- Mobile Menu Button -->
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
        
        <!-- Mobile Menu (Hidden by default) -->
        <div class="mobile-menu hidden" id="mobile-menu">
            <a href="index.html#home" class="nav-link hover:text-blue-600 transition">Home</a>
            <a href="index.html#projects" class="nav-link hover:text-blue-600 transition">Projects</a>
            <a href="index.html#github" class="nav-link hover:text-blue-600 transition">GitHub</a>
            <a href="index.html#skills" class="nav-link hover:text-blue-600 transition">Skills</a>
            <a href="index.html#contact" class="nav-link hover:text-blue-600 transition">Contact</a>
        </div>
    </nav>

    <!-- Thank You Content -->
    <main class="flex-grow flex items-center justify-center px-4 pt-20">
        <div class="max-w-xl w-full thank-you-card">
            <div class="glass-darker rounded-2xl p-8 md:p-12 text-center">
                <div class="mb-6 mx-auto w-20 h-20 flex items-center justify-center bg-green-100 rounded-full">
                    <svg class="w-12 h-12 text-green-500 check-mark" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                
                <h1 class="text-3xl md:text-4xl font-bold mb-4 gradient-text">Thank You!</h1>
                
                <p class="text-lg text-gray-700 mb-6">
                    Your message has been received. I'll get back to you as soon as possible!
                </p>
                
                <div class="mb-8 glass rounded-lg p-4 bg-blue-50 text-gray-700">
                    <p class="flex items-start gap-2">
                        <svg class="w-5 h-5 text-blue-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>Please allow up to 48 hours for a response during business days.</span>
                    </p>
                </div>
                
                <a href="index.html" class="inline-flex items-center font-medium text-blue-600 hover:text-blue-800 back-btn">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Portfolio
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-6 text-center text-gray-600 mt-auto">
        <p>© 2025 Portfolio. All rights reserved.</p>
    </footer>

    <script>
        // Mobile menu toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.toggle('hidden');
        });
        
        // Auto redirect to index.html after 10 seconds
        
        setTimeout(function() {
            window.location.href = 'index.html';
        }, 10000); // 10 seconds
        
    </script>
</body>
</html>
